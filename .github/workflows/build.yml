name: build
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
env:
  REGISTRY: ghcr.io
jobs:
  build:
    runs-on: magic8ball-api-runners
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive tags
        id: tags
        run: |
          repo="${{ github.repository }}"
          repo="${repo,,}"
          tags="${{ env.REGISTRY }}/${repo}:latest"
          tags="$tags,${{ env.REGISTRY }}/${repo}:sha-${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tags="$tags,${{ env.REGISTRY }}/${repo}:${GITHUB_REF#refs/tags/}"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          network: host
